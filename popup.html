<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>State Decoder</title>
    <style>
      body {
        margin: 0;
        min-width: 520px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #111827;
        color: #e5e7eb;
        padding: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      #output {
        display: grid;
        gap: 10px;
      }
      .panel {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 0;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset;
      }
      .panel-toggle {
        list-style: none;
        cursor: pointer;
        padding: 12px;
        font-size: 13px;
        font-weight: 700;
        color: #f9fafb;
        word-break: break-word;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .panel-toggle::-webkit-details-marker {
        display: none;
      }
      .panel-toggle::after {
        content: "+";
        color: #93c5fd;
        font-size: 14px;
        line-height: 1;
        flex: 0 0 auto;
      }
      .panel[open] .panel-toggle::after {
        content: "−";
      }
      .panel-body {
        display: grid;
        gap: 8px;
        font-size: 12px;
        line-height: 1.45;
        padding: 0 12px 12px;
      }
      .field {
        display: grid;
        gap: 2px;
      }
      .field-key {
        color: #93c5fd;
        font-weight: 600;
        text-transform: none;
      }
      .field-value {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #e5e7eb;
      }
      .table-wrap {
        overflow-x: auto;
        border: 1px solid #374151;
        border-radius: 8px;
      }
      .params-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .params-table th,
      .params-table td {
        padding: 8px;
        border-bottom: 1px solid #374151;
        text-align: left;
        vertical-align: top;
        word-break: break-word;
      }
      .params-table th {
        color: #93c5fd;
        background: #111827;
        font-weight: 700;
      }
      .params-table tr:last-child td {
        border-bottom: 0;
      }
      .id-link {
        color: #93c5fd;
        text-decoration: none;
      }
      .id-link:hover {
        text-decoration: underline;
      }
      .plain {
        margin: 0;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      .muted {
        color: #9ca3af;
      }
      .error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <h1>State Decoder</h1>
    <div id="output" class="muted">Loading...</div>
    <script src="popup.js"></script>
  </body>
</html>
