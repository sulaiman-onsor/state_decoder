<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>State Decoder</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #111827;
        color: #e5e7eb;
        padding: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      pre {
        margin: 0;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 280px;
        overflow: auto;
        font-size: 12px;
      }
      .muted {
        color: #9ca3af;
      }
      .error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <h1>State Decoder</h1>
    <pre id="output" class="muted">Loading...</pre>
    <script src="popup.js"></script>
  </body>
</html>
